<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CatchUp</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #16161d;
        --panel: #1f1f29;
        --border: #33333f;
        --text: #ececf1;
        --muted: #9a9aa8;
        --accent: #7c6cf0;
        --accent-text: #ffffff;
        --error: #ff7a7a;
      }
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      header .brand { font-weight: 700; font-size: 14px; }
      header .brand span { color: var(--accent); }
      #now-watching { flex: 1; text-align: right; min-width: 0; }
      #video-title {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }
      #video-time { color: var(--muted); font-variant-numeric: tabular-nums; }

      #subtitle-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      #subtitle-status { flex: 1; color: var(--muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #subtitle-status.loaded { color: #8fd694; }

      button {
        font: inherit;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-text);
        font-weight: 600;
      }
      button.primary:disabled { opacity: 0.5; cursor: default; }

      #paste-area { display: none; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--panel); }
      #paste-area.open { display: block; }
      #paste-text {
        width: 100%;
        height: 90px;
        resize: vertical;
        font: 11px/1.4 ui-monospace, monospace;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px;
      }
      #paste-area .row { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }

      #chat {
        height: 300px;
        overflow-y: auto;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg { max-width: 88%; padding: 7px 10px; border-radius: 10px; white-space: pre-wrap; }
      .msg.user { align-self: flex-end; background: var(--accent); color: var(--accent-text); border-bottom-right-radius: 3px; }
      .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
      .msg.error { align-self: stretch; background: transparent; border: 1px solid var(--error); color: var(--error); }
      .msg .stamp { display: block; margin-top: 4px; font-size: 11px; opacity: 0.65; font-variant-numeric: tabular-nums; }
      #empty-hint { color: var(--muted); text-align: center; margin: auto; padding: 0 20px; }

      form {
        display: flex;
        gap: 8px;
        padding: 10px 14px;
        border-top: 1px solid var(--border);
      }
      #question {
        flex: 1;
        font: inherit;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
      }
      #question:focus { outline: none; border-color: var(--accent); }

      footer { padding: 0 14px 10px; text-align: right; }
      footer a { color: var(--muted); font-size: 11px; text-decoration: none; }
      footer a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">Catch<span>Up</span></div>
      <div id="now-watching">
        <span id="video-title">Looking for a video…</span>
        <span id="video-time"></span>
      </div>
    </header>

    <div id="subtitle-bar">
      <span id="subtitle-status">No subtitles loaded</span>
      <button id="paste-toggle" type="button">Paste</button>
      <button id="file-button" type="button">Load .srt/.vtt</button>
      <input id="file-input" type="file" accept=".srt,.vtt,text/vtt,application/x-subrip" hidden />
    </div>

    <div id="paste-area">
      <textarea id="paste-text" placeholder="Paste SRT or VTT subtitle text here…"></textarea>
      <div class="row">
        <button id="paste-cancel" type="button">Cancel</button>
        <button id="paste-save" type="button" class="primary">Use subtitles</button>
      </div>
    </div>

    <div id="chat">
      <div id="empty-hint">
        Missed something? Ask a question — answers only use dialogue up to your
        current timestamp. No spoilers.
      </div>
    </div>

    <form id="ask-form">
      <input
        id="question"
        type="text"
        placeholder="e.g. Wait, how did she end up in the hospital?"
        autocomplete="off"
      />
      <button id="ask-button" type="submit" class="primary">Ask</button>
    </form>

    <footer><a href="#" id="open-options">API key settings</a></footer>

    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
